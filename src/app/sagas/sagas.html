<div class='card'>
    <div class='card-header'>
      {{pageTitle}}
    </div>

      <div class='row'>
        <div class='col-md-6'>
          <h4>&nbsp;</h4>
        </div>

        <table class='table'>
          <thead>
            <tr>
              <th>Saga ID</th>
              <th>Name</th>
              <th>Description</th>
              <th>Date</th>
              <th>Translated?</th>
              <th>Bibliography</th>
              <th>Folklore</th>
              <th>Person</th>
              <th>Place</th>
              <th>Object</th>
              <th>MS</th>
            </tr>
            <tr *ngFor="let saga of sagas, let i = index">

                <!--ID-->
                <td>{{saga.id}}</td>

                <!--NAME-->
                <td>
                  {{saga.name}}
                </td>

                <!--DESCRIPTION-->
                <td>
                  {{saga.description}}
                </td>

                <!--DATE-->
                <td>
                 {{saga.date}}
                </td>

                <!--TRANSLATED?-->
                <td>
                  {{saga.isTranslated}}
                </td>

                <!--BIB IDS-->
                <td>
                 {{saga.bibIds}}
                </td>

                <!--FOLKLORE IDS-->
                <td>
                  {{saga.folkloreIds}}
                </td>

                <!--PERSON IDS-->
                <td>
                  {{saga.personIds}}
                </td>

                <!--PLACE IDS-->
                <td>
                  {{saga.placeIds}}
                </td>

                <!--OBJECT IDS-->
                <td>
                  {{saga.objectIds}}
                </td>

                <!--MS IDS-->
                <td>
                  {{saga.msIds}}
                </td>
          </thead> 
        </table>
      </div>
    </div>
